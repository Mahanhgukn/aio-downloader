name: "aio-leecher"

on:
  workflow_dispatch:
    inputs:
      url:
        description: |
          One or more URLs (newlines, commas, or spaces).
          Each URL may be followed by:
            - Shortcut mode:  v <quality>  or  a <quality>
              Video: max | min | height (e.g. 480, 720, 1080, 4k)
              Audio: max | min | bitrate in kbps (e.g. 128, 192, 320)
            - Raw mode:  -- <raw yt-dlp arguments>
              Example:  https://example.com/video -- -f bestvideo+bestaudio --merge-output-format mkv
        required: true
        type: string
      bundle_all:
        description: 'Bundle all downloaded files into a single ZIP archive before splitting'
        type: boolean
        default: false
      upload_method:
        description: 'Upload destination'
        required: true
        type: choice
        options:
          - repo          # Push to repo (split 99MB)
          - release       # GitHub Release
          - drive         # Google Drive (folder: github-actions)
        default: repo
      vpn_enabled:
        description: 'Route downloads through WireGuard VPN (requires secret WG_CONFIG)'
        type: boolean
        default: false
      impersonate:
        description: 'Impersonate a browser/client (uses curl_cffi) – leave “None” to disable'
        type: choice
        options:
          - None
          - Chrome-133:Macos-15
          - Chrome-136:Macos-15
          - Safari-17.2:Ios-17.2
          - Safari-18.0:Ios-18.0
          - Safari-18.4:Ios-18.4
          - Safari-26.0:Ios-26.0
          - Chrome-99:Android-12
          - Chrome-131:Android-14
          - Tor-14.5:Macos-14
          - Edge-99:Windows-10
          - Edge-101:Windows-10
          - Firefox-133:Macos-14
          - Firefox-135:Macos-14
          - Safari-15.3:Macos-14
          - Safari-15.5:Macos-14
          - Safari-17.0:Macos-14
          - Safari-18.0:Macos-15
          - Safari-18.4:Macos-15
          - Safari-26.0:Macos-26
          - Chrome-99:Windows-10
          - Chrome-100:Windows-10
          - Chrome-101:Windows-10
          - Chrome-104:Windows-10
          - Chrome-107:Windows-10
          - Chrome-110:Windows-10
          - Chrome-116:Windows-10
          - Chrome-119:Macos-14
          - Chrome-120:Macos-14
          - Chrome-123:Macos-14
          - Chrome-124:Macos-14
          - Chrome-131:Macos-14
        default: None

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 700
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: "Install yt-dlp, jq, ffmpeg, Deno"
        run: |
          echo "→ Installing / updating yt-dlp..."
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          if ! command -v yt-dlp &> /dev/null; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux \
              -o ~/.local/bin/yt-dlp
            chmod a+rx ~/.local/bin/yt-dlp
          fi
          echo "✅ yt-dlp ready."

          echo "→ Installing jq, ffmpeg..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq ffmpeg
          echo "✅ jq & ffmpeg ready."

          echo "→ Installing Deno (required for YouTube bot detection bypass)..."
          if ! command -v deno &> /dev/null; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
            echo "$HOME/.deno/bin" >> $GITHUB_PATH
          fi
          echo "✅ Deno ready."

      - name: "Parse URLs"
        id: parse
        run: |
          INPUT="${{ github.event.inputs.url }}"
          MODIFIED=$(echo "$INPUT" | tr ',' '\n')
          ENTRIES='[]'

          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            [ -z "$line" ] && continue
            tokens=($line)
            i=0
            while [ $i -lt ${#tokens[@]} ]; do
              token="${tokens[$i]}"
              if [[ "$token" =~ ^https?:// ]]; then
                link="$token"
                args=()
                raw=false
                i=$((i+1))
                while [ $i -lt ${#tokens[@]} ]; do
                  next="${tokens[$i]}"
                  [[ "$next" =~ ^https?:// ]] && break
                  args+=("$next")
                  i=$((i+1))
                done

                if [ "${args[0]}" = "--" ]; then
                  raw=true
                  args=( "${args[@]:1}" )
                  echo " ⚡ Raw mode detected — shortcut logic will be skipped"
                fi

                args_json=$(printf '%s\n' "${args[@]}" | jq -R . | jq -s .)
                entry=$(jq -n \
                  --arg link "$link" \
                  --argjson args "$args_json" \
                  --argjson raw "$raw" \
                  '{link: $link, args: $args, raw: $raw}')
                ENTRIES=$(echo "$ENTRIES" | jq ". + [$entry]")
              else
                i=$((i+1))
              fi
            done
          done <<< "$MODIFIED"

          ENTRIES_JSON=$(echo "$ENTRIES" | jq -c .)
          echo "ENTRIES_JSON=$ENTRIES_JSON" >> $GITHUB_OUTPUT
          echo "✅ Parsed $(echo "$ENTRIES" | jq length) URL(s)."

      - name: "Set up WireGuard VPN (if enabled)"
        id: vpn
        run: |
          VPN_ENABLED="${{ inputs.vpn_enabled }}"
          echo "VPN_ENABLED=$VPN_ENABLED"

          if [ "$VPN_ENABLED" = "true" ]; then
            if [ -z "${{ secrets.WG_CONFIG }}" ]; then
              echo "⚠️ VPN enabled but WG_CONFIG secret is empty – VPN disabled for this run."
              echo "vpn_available=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "→ Installing WireGuard tools..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq wireguard-tools openresolv 2>/dev/null || sudo apt-get install -y -qq wireguard-tools

            echo "→ Writing WireGuard config..."
            cat <<'EOF' > /tmp/wg0.conf
          ${{ secrets.WG_CONFIG }}
          EOF
            sudo cp /tmp/wg0.conf /etc/wireguard/wg0.conf
            sudo chmod 600 /etc/wireguard/wg0.conf

            echo "→ Bringing up wg0..."
            if sudo wg-quick up wg0; then
              echo "✅ WireGuard VPN connected."
              echo "vpn_available=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Failed to bring up WireGuard – VPN disabled."
              sudo wg-quick down wg0 2>/dev/null || true
              echo "vpn_available=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "vpn_available=false" >> $GITHUB_OUTPUT
          fi

      - name: "Download (with retry & failure tracking)"
        id: download
        run: |
          ENTRIES_JSON='${{ steps.parse.outputs.ENTRIES_JSON }}'
          OUTPUT_FOLDER="downloads"
          mkdir -p "$OUTPUT_FOLDER"

          # ── Impersonate argument ──
          IMPERSONATE_TARGET="${{ inputs.impersonate }}"
          IMPERSONATE_ARG_ARRAY=()
          if [ "$IMPERSONATE_TARGET" != "None" ]; then
            IMPERSONATE_ARG_ARRAY=(--impersonate "$IMPERSONATE_TARGET")
            echo "🎭 Using impersonation: $IMPERSONATE_TARGET"
          else
            echo "🎭 No impersonation (None selected)"
          fi

          # ── Base yt-dlp arguments (Deno + EJS for YouTube challenges) ──
          YTDLP_BASE_ARGS="--js-runtimes deno --remote-components ejs:npm --no-progress --no-warnings"

          # Cookie helpers
          COOKIE_ARGS=""
          if [ -n "$INSTAGRAM_COOKIES" ]; then
            echo "$INSTAGRAM_COOKIES" > /tmp/instagram_cookies.txt
            COOKIE_ARGS="$COOKIE_ARGS --cookies /tmp/instagram_cookies.txt"
          fi
          if [ -n "$X_COOKIES" ]; then
            echo "$X_COOKIES" > /tmp/x_cookies.txt
            COOKIE_ARGS="$COOKIE_ARGS --cookies /tmp/x_cookies.txt"
          fi
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > /tmp/youtube_cookies.txt
            COOKIE_ARGS="$COOKIE_ARGS --cookies /tmp/youtube_cookies.txt"
          fi
          if [ -n "$SOMEWEBSITE_COOKIES" ]; then
            echo "$SOMEWEBSITE_COOKIES" > /tmp/somewebsite_cookies.txt
            COOKIE_ARGS="$COOKIE_ARGS --cookies /tmp/somewebsite_cookies.txt"
          fi

          VPN_AVAILABLE="${{ steps.vpn.outputs.vpn_available }}"
          run_with_fallback() {
            desc="$1"
            shift
            if [ "$VPN_AVAILABLE" = "true" ]; then
              echo "→ [VPN] $desc"
              if "$@"; then
                echo "✅ [VPN] succeeded."
                return 0
              else
                echo "⚠️ [VPN] failed – falling back to direct connection..."
                sudo wg-quick down wg0 2>/dev/null || true
                echo "→ [Direct] $desc"
                if "$@"; then
                  echo "✅ [Direct] succeeded (VPN failed)."
                  sudo wg-quick up wg0
                  return 0
                else
                  echo "❌ [Direct] also failed."
                  sudo wg-quick up wg0 2>/dev/null || true
                  return 1
                fi
              fi
            else
              echo "→ $desc"
              "$@"
              return $?
            fi
          }

          # ── Extract clean JSON from potentially polluted output ──
          sanitize_json_output() {
            local infile="$1" outfile="$2"
            # Grab the first line that starts with '{' (the actual JSON)
            grep -m1 '^{' "$infile" > "$outfile" 2>/dev/null
            if [ -s "$outfile" ]; then
              return 0
            else
              return 1
            fi
          }

          # ── Fallback format selection from -F table ──
          # Usage: parse_format_table <type: v|a> <val: max|min|720|192|...> <formats_file>
          # Outputs selected format ID and descriptive tag to stdout
          parse_format_table() {
            local type="$1" val="$2" table_file="$3"
            # The table columns: ID EXT RESOLUTION FPS | FILESIZE TBR PROTO | VCODEC ACODEC
            # We need to select based on type.
            if [ "$type" = "a" ]; then
              # Audio: look for rows with "audio only" or an ACODEC not "unknown". Use TBR as bitrate.
              # Extract rows with a valid acodec (not "unknown") and maybe "audio only".
              # For simplicity, we'll sort by TBR and pick the closest bitrate.
              local bitrate="$val"
              awk -v target="$bitrate" '
                /^[a-zA-Z0-9_-]+[[:space:]]/ && NF>=2 {
                  id=$1; tbr=0;
                  # Find TBR column: after the "|" there are filesize, TBR, proto.
                  # Simplistic: column after "|" is TBR if numeric.
                  # This is fragile; we will extract the number from the TBR column if present.
                  if (match($0, /[~ ]([0-9]+(\.[0-9]+)?)[kKMG]?[[:space:]]+[a-z0-9]+ /, arr)) {
                    tbr_str=arr[1]; gsub(/[kKMG]/,"",tbr_str); tbr=tbr_str+0;
                  }
                  # Filter audio-only rows: either "audio only" in line or acodec!=unknown
                  if ($0 ~ /audio only/ || ($NF != "unknown" && $(NF-1) == "unknown")) {
                    diff = tbr - target;
                    if (diff < 0) diff = -diff;
                    print diff, tbr, id;
                  }
                }
              ' "$table_file" | sort -n | head -1 | awk '{print $3, $2}'
            else
              # Video: look for combined formats (vcodec != "unknown" and acodec != "unknown")
              # Use resolution (height). Extract widthxheight.
              local height="$val"
              awk -v target="$height" '
                /^[a-zA-Z0-9_-]+[[:space:]]/ && NF>=2 {
                  id=$1; res=$3; height=0;
                  if (res ~ /^[0-9]+x[0-9]+$/) {
                    split(res, a, "x"); height=a[2];
                  } else if (res ~ /^[0-9]+p$/) {
                    height=substr(res,1,length(res)-1);
                  }
                  # Only consider combined: vcodec and acodec not "unknown"
                  if ($(NF-1) != "unknown" && $NF != "unknown") {
                    diff = height - target;
                    if (diff < 0) diff = -diff;
                    print diff, height, id;
                  }
                }
              ' "$table_file" | sort -n | head -1 | awk '{print $3, $2}'
            fi
          }

          # ── Helper to process one entry (returns 0 on success, 1 on failure) ──
          process_entry() {
            local link="$1" type="$2" val="$3" raw="$4" idx="$5"

            echo "========================================"
            echo " Processing $idx: $link"
            echo " Raw mode: $raw  Type: $type  Val: $val"
            echo "========================================"

            if [ "$raw" = "true" ]; then
              run_with_fallback "Raw download: $link" \
                yt-dlp $COOKIE_ARGS "${IMPERSONATE_ARG_ARRAY[@]}" $YTDLP_BASE_ARGS $val -o "$OUTPUT_FOLDER/%(title)s.%(ext)s" "$link" && return 0 || {
                echo "❌ Raw download failed"
                return 1
              }
            fi

            # ── List formats and save output for potential fallback ──
            FORMAT_TABLE_FILE=$(mktemp)
            echo ""
            echo "→ Listing formats (may help debug):"
            if ! run_with_fallback "List formats (standard)" \
              yt-dlp $COOKIE_ARGS "${IMPERSONATE_ARG_ARRAY[@]}" $YTDLP_BASE_ARGS -F "$link" 2>&1 | tee "$FORMAT_TABLE_FILE"; then
              echo "⚠️ Standard format listing failed, retrying with --force-ipv4..."
              run_with_fallback "List formats (force IPv4)" \
                yt-dlp $COOKIE_ARGS "${IMPERSONATE_ARG_ARRAY[@]}" $YTDLP_BASE_ARGS --force-ipv4 -F "$link" 2>&1 | tee "$FORMAT_TABLE_FILE" || true
            fi
            echo ""

            # ── Fetch metadata (JSON) with stderr isolation & fallback ──
            echo "→ Fetching metadata (JSON)..."
            METADATA_RAW=$(mktemp)
            METADATA_CLEAN=$(mktemp)
            JSON_OK=false
            if run_with_fallback "Metadata fetch (standard)" \
              yt-dlp $COOKIE_ARGS "${IMPERSONATE_ARG_ARRAY[@]}" $YTDLP_BASE_ARGS -j "$link" > "$METADATA_RAW" 2> "metadata_errors_${idx}.log"; then
              if sanitize_json_output "$METADATA_RAW" "$METADATA_CLEAN"; then
                JSON_OK=true
              else
                echo "⚠️ Metadata output is not valid JSON"
              fi
            else
              echo "⚠️ Standard metadata fetch failed, retrying with --force-ipv4..."
              if run_with_fallback "Metadata fetch (force IPv4)" \
                yt-dlp $COOKIE_ARGS "${IMPERSONATE_ARG_ARRAY[@]}" $YTDLP_BASE_ARGS --force-ipv4 -j "$link" > "$METADATA_RAW" 2> "metadata_errors_${idx}.log"; then
                if sanitize_json_output "$METADATA_RAW" "$METADATA_CLEAN"; then
                  JSON_OK=true
                else
                  echo "⚠️ Metadata still not valid JSON after retry"
                fi
              fi
            fi

            if [ "$JSON_OK" = "true" ]; then
              VIDEO_JSON=$(cat "$METADATA_CLEAN")
              rm -f "$METADATA_RAW" "$METADATA_CLEAN" "metadata_errors_${idx}.log"
            else
              echo "⚠️ JSON metadata unavailable – falling back to format table parsing"
              rm -f "$METADATA_RAW" "$METADATA_CLEAN" "metadata_errors_${idx}.log"
              # Try to select a format from the -F table
              if [ -s "$FORMAT_TABLE_FILE" ]; then
                selected=$(parse_format_table "$type" "$val" "$FORMAT_TABLE_FILE")
                if [ -n "$selected" ]; then
                  FORMAT_ID=$(echo "$selected" | awk '{print $1}')
                  desc_tag=$(echo "$selected" | awk '{print $2}')
                  echo "→ Fallback selected format: $FORMAT_ID (height/bitrate ~${desc_tag})"
                  # ── Fallback always uses a random name because we lack the title ──
                  if [ "$type" = "a" ]; then
                    suffix="${desc_tag}kbps"
                  else
                    suffix="${desc_tag}p"
                  fi
                  RAND_NAME=$(cat /dev/urandom | tr -dc 'A-Za-z' | head -c10)
                  STEM="${RAND_NAME}-${suffix}"
                  YT_OUTPUT=(-o "$OUTPUT_FOLDER/${STEM}.%(ext)s")
                  if run_with_fallback "Fallback download $link ($suffix)" \
                    yt-dlp $COOKIE_ARGS "${IMPERSONATE_ARG_ARRAY[@]}" $YTDLP_BASE_ARGS -f "$FORMAT_ID" \
                      "${YT_OUTPUT[@]}" "$link"; then
                    echo "✅ Fallback download succeeded"
                    rm -f "$FORMAT_TABLE_FILE"
                    return 0
                  else
                    echo "❌ Fallback download failed"
                    rm -f "$FORMAT_TABLE_FILE"
                    return 1
                  fi
                else
                  echo "❌ Could not determine a format from the table"
                  rm -f "$FORMAT_TABLE_FILE"
                  return 1
                fi
              else
                echo "❌ No format table available – cannot proceed"
                rm -f "$FORMAT_TABLE_FILE"
                return 1
              fi
            fi

            # ── Normal JSON-based selection (original logic with filename length safeguard) ──
            if [ "$type" = "a" ]; then
              # ── AUDIO ──
              AUDIO_FORMATS=$(echo "$VIDEO_JSON" | jq '[.formats[] | select(.vcodec == "none" and .acodec != "none")]')
              if [ "$(echo "$AUDIO_FORMATS" | jq length)" -eq 0 ]; then
                echo "❌ No audio-only formats found"
                rm -f "$FORMAT_TABLE_FILE"
                return 1
              fi
              echo "→ Found $(echo "$AUDIO_FORMATS" | jq length) audio-only formats."

              case "$val" in
                max)
                  FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r 'max_by(.abr // .tbr) | .format_id')
                  CHOSEN=$(echo "$AUDIO_FORMATS" | jq -r 'max_by(.abr // .tbr) | .abr // .tbr')
                  ;;
                min)
                  FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r 'min_by(.abr // .tbr) | .format_id')
                  CHOSEN=$(echo "$AUDIO_FORMATS" | jq -r 'min_by(.abr // .tbr) | .abr // .tbr')
                  ;;
                *)
                  BITRATE="$val"
                  BITRATES=$(echo "$AUDIO_FORMATS" | jq '[.[].abr // .tbr | select(. != null)] | unique | sort')
                  if [ "$(echo "$BITRATES" | jq length)" -eq 0 ]; then
                    echo "❌ No valid bitrate info"
                    rm -f "$FORMAT_TABLE_FILE"
                    return 1
                  fi
                  CHOSEN=$(echo "$BITRATES" | jq --argjson b "$BITRATE" \
                    'map({br:., d:(. - $b | abs)}) | sort_by(.d, .br) | first.br')
                  FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r --argjson br "$CHOSEN" \
                    'map(select((.abr // .tbr) == $br)) | first.format_id')
                  ;;
              esac
              echo "→ Selected format: $FORMAT_ID (bitrate ~${CHOSEN} kbps)"

              # ---------- NEW: construct safe filename ----------
              TITLE=$(echo "$VIDEO_JSON" | jq -r '.title')
              SUFFIX="${CHOSEN}kbps"
              MAX_STEM=200
              SUF_LEN=$(( ${#SUFFIX} + 1 ))  # +1 for the dash
              MAX_TITLE_LEN=$(( MAX_STEM - SUF_LEN ))
              if [ ${#TITLE} -gt $MAX_TITLE_LEN ]; then
                RAND=$(cat /dev/urandom | tr -dc 'A-Za-z' | head -c10)
                STEM="${RAND}-${SUFFIX}"
              else
                SANITIZED=$(echo "$TITLE" | sed 's/[\\/*?:"<>|]//g' | tr ' ' '_' | tr -dc '[:alnum:]_.-()' | head -c "$MAX_TITLE_LEN")
                if [ -z "$SANITIZED" ]; then
                  RAND=$(cat /dev/urandom | tr -dc 'A-Za-z' | head -c10)
                  STEM="${RAND}-${SUFFIX}"
                else
                  STEM="${SANITIZED}-${SUFFIX}"
                fi
              fi
              YT_OUTPUT=(-o "$OUTPUT_FOLDER/${STEM}.%(ext)s")
              # ---------- end of new block ----------

              if run_with_fallback "Download audio $link ($CHOSEN kbps)" \
                yt-dlp $COOKIE_ARGS "${IMPERSONATE_ARG_ARRAY[@]}" $YTDLP_BASE_ARGS -f "$FORMAT_ID" \
                  "${YT_OUTPUT[@]}" "$link"; then
                echo "✅ Audio download succeeded"
                rm -f "$FORMAT_TABLE_FILE"
                return 0
              else
                echo "❌ Audio download failed"
                rm -f "$FORMAT_TABLE_FILE"
                return 1
              fi
            else
              # ── VIDEO ──
              COMBINED=$(echo "$VIDEO_JSON" | jq '[.formats[] | select(.vcodec != "none" and .acodec != "none")]')
              if [ "$(echo "$COMBINED" | jq length)" -eq 0 ]; then
                echo "⚠️ No combined formats – trying bestvideo+bestaudio fallback"
                if run_with_fallback "Fallback bestvideo+bestaudio for $link" \
                  yt-dlp $COOKIE_ARGS "${IMPERSONATE_ARG_ARRAY[@]}" $YTDLP_BASE_ARGS -f "bestvideo+bestaudio/best" \
                    -o "$OUTPUT_FOLDER/%(title)s.%(ext)s" "$link"; then
                  rm -f "$FORMAT_TABLE_FILE"
                  return 0
                else
                  rm -f "$FORMAT_TABLE_FILE"
                  return 1
                fi
              fi
              echo "→ Found $(echo "$COMBINED" | jq length) combined formats."

              NON_NULL_HEIGHTS=$(echo "$COMBINED" | jq 'map(select(.height != null))')
              HAS_HEIGHTS=$(echo "$NON_NULL_HEIGHTS" | jq length)

              case "$val" in
                max)
                  if [ "$HAS_HEIGHTS" -gt 0 ]; then
                    FORMAT_ID=$(echo "$NON_NULL_HEIGHTS" | jq -r 'max_by(.height, .fps) | .format_id')
                    CHOSEN=$(echo "$NON_NULL_HEIGHTS" | jq -r 'max_by(.height, .fps) | .height')
                  else
                    echo "⚠️ All formats have unknown resolution – picking first combined."
                    FORMAT_ID=$(echo "$COMBINED" | jq -r 'first.format_id')
                    CHOSEN="unknown"
                  fi
                  ;;
                min)
                  if [ "$HAS_HEIGHTS" -gt 0 ]; then
                    FORMAT_ID=$(echo "$NON_NULL_HEIGHTS" | jq -r 'min_by(.height, .fps) | .format_id')
                    CHOSEN=$(echo "$NON_NULL_HEIGHTS" | jq -r 'min_by(.height, .fps) | .height')
                  else
                    echo "⚠️ All formats have unknown resolution – picking first combined."
                    FORMAT_ID=$(echo "$COMBINED" | jq -r 'first.format_id')
                    CHOSEN="unknown"
                  fi
                  ;;
                *)
                  HEIGHT="$val"
                  HEIGHTS=$(echo "$NON_NULL_HEIGHTS" | jq '[.[].height] | unique | sort')
                  if [ "$(echo "$HEIGHTS" | jq length)" -eq 0 ]; then
                    echo "❌ No formats with known resolution – falling back to best."
                    if run_with_fallback "Fallback best for $link" \
                      yt-dlp $COOKIE_ARGS "${IMPERSONATE_ARG_ARRAY[@]}" $YTDLP_BASE_ARGS -f "best" \
                        -o "$OUTPUT_FOLDER/%(title)s.%(ext)s" "$link"; then
                      rm -f "$FORMAT_TABLE_FILE"
                      return 0
                    else
                      rm -f "$FORMAT_TABLE_FILE"
                      return 1
                    fi
                  fi
                  CHOSEN=$(echo "$HEIGHTS" | jq --argjson h "$HEIGHT" \
                    'map({h:., d:(. - $h | abs)}) | sort_by(.d, .h) | first.h')
                  MATCHING=$(echo "$COMBINED" | jq --argjson h "$CHOSEN" 'map(select(.height == $h))')
                  FORMAT_ID=$(echo "$MATCHING" | jq -r 'max_by(.fps) | .format_id')
                  ;;
              esac

              # ---------- NEW: construct safe filename ----------
              TITLE=$(echo "$VIDEO_JSON" | jq -r '.title')
              if [ "$CHOSEN" = "unknown" ]; then
                SUFFIX=""
              else
                SUFFIX="${CHOSEN}p"
              fi
              MAX_STEM=200
              if [ -n "$SUFFIX" ]; then
                SUF_LEN=$(( ${#SUFFIX} + 1 ))
              else
                SUF_LEN=0
              fi
              MAX_TITLE_LEN=$(( MAX_STEM - SUF_LEN ))
              if [ ${#TITLE} -gt $MAX_TITLE_LEN ]; then
                RAND=$(cat /dev/urandom | tr -dc 'A-Za-z' | head -c10)
                if [ -n "$SUFFIX" ]; then
                  STEM="${RAND}-${SUFFIX}"
                else
                  STEM="${RAND}"
                fi
              else
                SANITIZED=$(echo "$TITLE" | sed 's/[\\/*?:"<>|]//g' | tr ' ' '_' | tr -dc '[:alnum:]_.-()' | head -c "$MAX_TITLE_LEN")
                if [ -z "$SANITIZED" ]; then
                  RAND=$(cat /dev/urandom | tr -dc 'A-Za-z' | head -c10)
                  if [ -n "$SUFFIX" ]; then
                    STEM="${RAND}-${SUFFIX}"
                  else
                    STEM="${RAND}"
                  fi
                else
                  if [ -n "$SUFFIX" ]; then
                    STEM="${SANITIZED}-${SUFFIX}"
                  else
                    STEM="${SANITIZED}"
                  fi
                fi
              fi
              YT_OUTPUT=(-o "$OUTPUT_FOLDER/${STEM}.%(ext)s")
              # ---------- end of new block ----------

              echo "→ Selected format: $FORMAT_ID (height ~${CHOSEN}p)"
              if run_with_fallback "Download video $link (${CHOSEN}p)" \
                yt-dlp $COOKIE_ARGS "${IMPERSONATE_ARG_ARRAY[@]}" $YTDLP_BASE_ARGS -f "$FORMAT_ID" \
                  "${YT_OUTPUT[@]}" "$link"; then
                rm -f "$FORMAT_TABLE_FILE"
                return 0
              else
                rm -f "$FORMAT_TABLE_FILE"
                return 1
              fi
            fi
          }

          # ── First pass ──
          FAILED_ENTRIES='[]'
          count=$(echo "$ENTRIES_JSON" | jq length)
          for ((idx=0; idx<count; idx++)); do
            entry=$(echo "$ENTRIES_JSON" | jq -c ".[$idx]")
            link=$(echo "$entry" | jq -r '.link')
            raw=$(echo "$entry" | jq -r '.raw')
            args_json=$(echo "$entry" | jq -c '.args')

            type=""
            val=""
            if [ "$raw" = "false" ]; then
              args_array=()
              while IFS= read -r arg; do
                args_array+=("$arg")
              done < <(echo "$args_json" | jq -r '.[]')
              if [ ${#args_array[@]} -ge 1 ]; then
                type="${args_array[0]}"
              fi
              if [ ${#args_array[@]} -ge 2 ]; then
                val="${args_array[1]}"
              fi
              [ -z "$type" ] && type="v"
              [ -z "$val" ]  && val="max"
            fi

            if ! process_entry "$link" "$type" "$val" "$raw" "$((idx+1))"; then
              echo "❌ First attempt failed for $link – queued for retry"
              FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [{link: \"$link\", type: \"$type\", val: \"$val\", raw: $raw}]")
            fi
            echo ""
          done

          # ── Retry pass ──
          FAILED_COUNT=$(echo "$FAILED_ENTRIES" | jq length)
          FINAL_FAILED='[]'
          if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "========================================="
            echo " Retrying $FAILED_COUNT failed link(s)..."
            echo "========================================="
            for ((r=0; r<FAILED_COUNT; r++)); do
              entry=$(echo "$FAILED_ENTRIES" | jq -c ".[$r]")
              link=$(echo "$entry" | jq -r '.link')
              type=$(echo "$entry" | jq -r '.type')
              val=$(echo "$entry" | jq -r '.val')
              raw=$(echo "$entry" | jq -r '.raw')
              if ! process_entry "$link" "$type" "$val" "$raw" "retry-$((r+1))"; then
                echo "❌ Retry also failed for $link"
                FINAL_FAILED=$(echo "$FINAL_FAILED" | jq ". + [\"$link\"]")
              fi
              echo ""
            done
          else
            echo "✅ No failures in first pass."
          fi

          # ── Write final failures ──
          FINAL_COUNT=$(echo "$FINAL_FAILED" | jq length)
          if [ "$FINAL_COUNT" -gt 0 ]; then
            echo "========================================="
            echo " Writing $FINAL_COUNT permanently failed link(s) to failed_leechs.txt"
            echo "$FINAL_FAILED" | jq -r '.[]' > "$OUTPUT_FOLDER/failed_leechs.txt"
          else
            echo "✅ All downloads succeeded!"
          fi

          if [ "$VPN_AVAILABLE" = "true" ]; then
            sudo wg-quick down wg0 2>/dev/null || true
          fi
        env:
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          X_COOKIES: ${{ secrets.X_COOKIES }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          SOMEWEBSITE_COOKIES: ${{ secrets.SOMEWEBSITE_COOKIES }}

      - name: "Archive files (bundle & upload method aware)"
        id: archive
        run: |
          if ! ls downloads/* 1>/dev/null 2>&1; then
            echo "⚠️ No files to archive."
            exit 0
          fi

          BUNDLE_ALL="${{ inputs.bundle_all }}"
          UPLOAD_METHOD="${{ inputs.upload_method }}"
          OUTPUT_DIR="leecher"
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          if [ "$UPLOAD_METHOD" = "repo" ]; then
            METHOD="split_push"
          else
            METHOD="release"
          fi

          if [ "$BUNDLE_ALL" = "true" ]; then
            BUNDLE_TMP="bundle_tmp"
            mkdir -p "$BUNDLE_TMP"
            find downloads -type f | while read -r f; do
              fname=$(basename "$f")
              TARGET="$BUNDLE_TMP/$fname"
              if [ -e "$TARGET" ]; then
                base="${fname%.*}"
                ext="${fname##*.}"
                if [ "$base" = "$ext" ]; then
                  base="$fname"
                  ext=""
                else
                  ext=".$ext"
                fi
                counter=1
                while [ -e "$BUNDLE_TMP/${base}_${counter}${ext}" ]; do
                  counter=$((counter + 1))
                done
                TARGET="$BUNDLE_TMP/${base}_${counter}${ext}"
              fi
              cp "$f" "$TARGET"
            done

            if [ -z "$(ls -A "$BUNDLE_TMP" 2>/dev/null)" ]; then
              echo "No files to bundle."
              rm -rf "$BUNDLE_TMP"
              exit 0
            fi

            RAND5=$(tr -dc 'a-z' </dev/urandom | head -c5)
            BUNDLE_ZIP="leech_bundle_${RAND5}.zip"
            echo "📦 Creating bundle ZIP: $BUNDLE_ZIP"

            if [ "$METHOD" = "release" ]; then
              (cd "$BUNDLE_TMP" && zip -0 -r "../${OUTPUT_DIR}/${BUNDLE_ZIP}" *)
              FULLZIP="${OUTPUT_DIR}/${BUNDLE_ZIP}"
              SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 2044723200 ]; then
                echo "Bundle ZIP larger than 1950 MiB, splitting"
                rm "$FULLZIP"
                (cd "$BUNDLE_TMP" && zip -0 -r -s 1950m "../${OUTPUT_DIR}/${BUNDLE_ZIP}" *)
              fi
            else
              (cd "$BUNDLE_TMP" && zip -0 -r -s 99m "../${OUTPUT_DIR}/${BUNDLE_ZIP}" *)
            fi
            rm -rf "$BUNDLE_TMP"
          else
            cd downloads
            for f in *; do
              [ -f "$f" ] || continue
              RND=$(cat /dev/urandom | tr -dc 'a-z' | head -c 5)
              echo "→ Zipping: $f"
              if [ "$METHOD" = "release" ]; then
                zip -0 -j "../${OUTPUT_DIR}/${f}_${RND}.zip" "$f"
                FULLZIP="${OUTPUT_DIR}/${f}_${RND}.zip"
                SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
                if [ "$SIZE" -gt 2044723200 ]; then
                  echo "ZIP larger than 1950 MiB, splitting"
                  rm "$FULLZIP"
                  zip -0 -j -s 1950m "../${OUTPUT_DIR}/${f}_${RND}.zip" "$f"
                fi
              else
                zip -0 -j -s 99m "../${OUTPUT_DIR}/${f}_${RND}.zip" "$f"
              fi
            done
            cd ..
          fi

          ls -1 "$OUTPUT_DIR" > "${OUTPUT_DIR}_assets.txt"
          echo "Assets to upload:"
          cat "${OUTPUT_DIR}_assets.txt"

      # ─── Google Drive Upload ─────────────────────────
      - name: "Upload to Google Drive"
        if: inputs.upload_method == 'drive'
        env:
          CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          # 1. Obtain access token
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" \
            -d grant_type=refresh_token | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "❌ Failed to obtain access token"
            exit 1
          fi

          # 2. Find or create 'github-actions' folder
          FOLDER_NAME="github-actions"
          QUERY="mimeType='application/vnd.google-apps.folder' and name='$FOLDER_NAME' and trashed=false"
          FOLDER_ID=$(curl -s -G \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            --data-urlencode "q=$QUERY" \
            --data-urlencode "fields=files(id)" \
            "https://www.googleapis.com/drive/v3/files" | jq -r '.files[0].id // ""')
          if [ -z "$FOLDER_ID" ]; then
            echo "→ Creating folder '$FOLDER_NAME'"
            FOLDER_ID=$(curl -s -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$FOLDER_NAME\", \"mimeType\":\"application/vnd.google-apps.folder\"}" \
              "https://www.googleapis.com/drive/v3/files?fields=id" | jq -r '.id')
            if [ -z "$FOLDER_ID" ] || [ "$FOLDER_ID" = "null" ]; then
              echo "❌ Failed to create folder"
              exit 1
            fi
          fi
          echo "✅ Folder ID: $FOLDER_ID"

          OUTPUT_DIR="leecher"
          for file in "$OUTPUT_DIR"/*; do
            [ -f "$file" ] || continue
            fname=$(basename "$file")
            size=$(stat -c%s "$file")
            echo "→ Uploading $fname ($size bytes)..."

            SESSION_URI=$(curl -s -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json; charset=UTF-8" \
              -H "X-Upload-Content-Type: application/zip" \
              -d "{\"name\":\"$fname\", \"parents\":[\"$FOLDER_ID\"]}" \
              "https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable" \
              -D - | tr -d '\r' | grep -i '^location:' | sed 's/^location: //i' | tr -d ' ')
            if [ -z "$SESSION_URI" ]; then
              echo "❌ Failed to initiate upload session for $fname, skipping"
              continue
            fi

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Length: $size" \
              -H "Content-Range: bytes 0-$((size-1))/$size" \
              --data-binary "@$file" \
              "$SESSION_URI")
            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "✅ Uploaded $fname"
            else
              echo "❌ Upload failed with HTTP $HTTP_CODE"
            fi
          done

      # ─── Push to repo ──────────────────────────────
      - name: "Upload to repository (split_push method)"
        if: inputs.upload_method == 'repo'
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$(ls -A leecher/ 2>/dev/null)" ]; then
            echo "⚠️ No files to upload."
            exit 0
          fi
          echo "→ Committing and pushing leecher/ content..."
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add leecher/*
          git commit -m "Add leech ZIPs [skip ci]" || echo "Nothing to commit"

          for i in $(seq 1 5); do
            echo "→ Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "✅ Push succeeded."
              break
            fi
            sleep 3
          done

      # ─── Release upload ────────────────────────────
      - name: "Create Release and upload assets (release method)"
        if: inputs.upload_method == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT_DIR="leecher"
          ASSETS_FILE="${OUTPUT_DIR}_assets.txt"

          if [ ! -s "$ASSETS_FILE" ]; then
            echo "No assets to release."
            exit 0
          fi

          RAND5=$(tr -dc 'a-z' </dev/urandom | head -c5)
          TAG="aio-leecher-${RAND5}"
          echo "Creating release tag: $TAG"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "$TAG" -m "AI‑O Leecher download release"
          git push origin "$TAG"

          ASSET_ARGS=""
          while IFS= read -r file; do
            ASSET_ARGS="$ASSET_ARGS ${OUTPUT_DIR}/$file"
          done < "$ASSETS_FILE"

          gh release create "$TAG" $ASSET_ARGS \
            --title "aio-leecher-${RAND5}" \
            --notes "Automated release from AI‑O Leecher workflow." \
            --target "${{ github.ref_name }}"

          echo "Release '$TAG' created with assets."

      - name: "Cleanup temporary files"
        if: always()
        run: |
          rm -rf downloads bundle_tmp /tmp/instagram_cookies.txt /tmp/x_cookies.txt /tmp/youtube_cookies.txt /tmp/somewebsite_cookies.txt 2>/dev/null || true
          sudo wg-quick down wg0 2>/dev/null || true
